<script>
// Tweaks defaults persisted via EDITMODE markers
window.__medaccerTweaks = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "density": "spacious",
  "accent": "blue"
}/*EDITMODE-END*/;
(function(){
  const t = window.__medaccerTweaks;
  document.body.dataset.theme = t.theme;
  document.body.dataset.density = t.density;
  document.body.dataset.accent = t.accent;
})();
</script>

<script type="text/babel" data-presets="react">
(function(){
  function TweaksPanel() {
    const [open, setOpen] = React.useState(false);
    const [available, setAvailable] = React.useState(false);
    const [vals, setVals] = React.useState(window.__medaccerTweaks);

    React.useEffect(() => {
      const h = (e) => {
        if (e.data?.type === '__activate_edit_mode') setAvailable(true);
        if (e.data?.type === '__deactivate_edit_mode') { setAvailable(false); setOpen(false); }
      };
      window.addEventListener('message', h);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', h);
    }, []);

    const update = (k, v) => {
      const next = { ...vals, [k]: v };
      setVals(next);
      document.body.dataset[k === 'theme' ? 'theme' : k === 'density' ? 'density' : 'accent'] = v;
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    };

    if (!available) return null;
    return (
      <>
        <button className="tweaks-fab" onClick={() => setOpen(!open)} title="Tweaks">
          <Icons.Sparkles size={20} stroke="white" />
        </button>
        {open && (
          <div className="tweaks-panel">
            <div className="tweaks-title">Tweaks <button onClick={() => setOpen(false)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--ink-500)', fontSize: 16 }}>×</button></div>
            <div className="tweak-row">
              <span>Tema</span>
              <div className="tweak-segmented">
                <button className={vals.theme === 'light' ? 'on' : ''} onClick={() => update('theme', 'light')}>Claro</button>
                <button className={vals.theme === 'dark' ? 'on' : ''} onClick={() => update('theme', 'dark')}>Oscuro</button>
              </div>
            </div>
            <div className="tweak-row">
              <span>Densidad</span>
              <div className="tweak-segmented">
                <button className={vals.density === 'cozy' ? 'on' : ''} onClick={() => update('density', 'cozy')}>Compacta</button>
                <button className={vals.density === 'comfy' ? 'on' : ''} onClick={() => update('density', 'comfy')}>Cómoda</button>
                <button className={vals.density === 'spacious' ? 'on' : ''} onClick={() => update('density', 'spacious')}>Amplia</button>
              </div>
            </div>
          </div>
        )}
      </>
    );
  }

  function Root() {
    return (
      <>
        <MedaccerApp />
        <TweaksPanel />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
})();
</script>
